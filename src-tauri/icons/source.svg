<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb" cx="38%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#bcc8ff"/>
      <stop offset="35%" stop-color="#6f7fee"/>
      <stop offset="80%" stop-color="#27308a"/>
      <stop offset="100%" stop-color="#10133a"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="rgba(111,127,238,0.0)"/>
      <stop offset="80%" stop-color="rgba(111,127,238,0.25)"/>
      <stop offset="100%" stop-color="rgba(111,127,238,0.0)"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="200" ry="200" fill="#0b0d10"/>
  <circle cx="512" cy="512" r="480" fill="url(#halo)"/>
  <circle cx="512" cy="512" r="340" fill="url(#orb)" filter="url(#glow)"/>
  <!-- distant stars -->
  <circle cx="180" cy="200" r="5" fill="#fff" opacity="0.8"/>
  <circle cx="860" cy="170" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="780" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="900" cy="850" r="5" fill="#fff" opacity="0.5"/>
  <circle cx="760" cy="320" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="270" cy="900" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="600" cy="120" r="2" fill="#fff" opacity="0.5"/>
</svg>
